kind = "mobile"
previewPath = "/halgo-mobile/"
title = "Halgo Cash Mobile"
version = "1.0.0"
id = "artifacts/halgo-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/halgo-mobile/" ]
localPort = 20598

[services.development]
run = "pnpm --filter @workspace/halgo-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/halgo-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/halgo-mobile", "run", "serve" ]

[services.env]
PORT = "20598"
BASE_PATH = "/halgo-mobile/"
