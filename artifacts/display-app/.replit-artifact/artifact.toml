kind = "web"
previewPath = "/display/"
title = "Public Display"
version = "1.0.0"
id = "artifacts/display-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/display/" ]
localPort = 19647

[services.development]
run = "pnpm --filter @workspace/display-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/display-app", "run", "build" ]
publicDir = "artifacts/display-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19647"
BASE_PATH = "/display/"
