services:
  - type: web
    name: halgo-cash
    env: node
    plan: free
    region: frankfurt
    buildCommand: bash render-build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: halgo-cash-db
          property: connectionString
      # Proxy Clerk — embarqué dans le build Vite, pointe vers le proxy Express
      - key: VITE_CLERK_PROXY_URL
        value: https://halgocash.com/api/__clerk
      # Clés Clerk — copier les valeurs depuis Replit Secrets (onglet Secrets)
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

databases:
  - name: halgo-cash-db
    plan: free
    region: frankfurt
